<!DOCTYPE html>
<html>
    <body>
        <a href="https://www.example.com/">Visit our website</a>
        <!-- href é o link para onde o usuário será direcionado ao clicar no hyperlink. -->

        <br><br>

        <h2 id="section-1">Section 1</h2>
        <!-- id é usado para criar um link interno para esta seção. -->

        <br><br>

        <a href="#section-1">Go to Section 1</a>
        <!-- Este hyperlink leva o usuário para a seção 1 da mesma página. -->

        <br><br>

        <a href="https://www.example.com" target="_blank">Visit Example Website</a>
        <!-- target="_blank" faz com que o link seja aberto em uma nova aba do navegador. -->

        <br><br>

        <a href="https://www.example.com" target="_self">Visit Example Website</a>
        <!-- target="_self" faz com que o link seja aberto na mesma aba do navegador. -->

        <br><br>

        <a href="mailto:info@example.com">Email Us</a>
        <!-- Quando um usuário clica neste link, seu cliente de e-mail padrão 
         será aberto com o campo "Para" pré-preenchido com o endereço de e-mail 
         especificado no link. -->

        <br><br>

        <a href="tel:123-456-7890">Call us at 123-456-7890</a>
        <!-- Quando um usuário clica neste link em um dispositivo com capacidade de telefone, 
         ele iniciará uma chamada para o número de telefone especificado. -->

         <br><br>

         <a href="https://example.com/document.pdf" download="my-document.pdf">Download my document</a>
        <!-- O atributo download sugere que o navegador baixe o arquivo em vez de navegar para ele.
         O valor do atributo download (neste caso, "my-document.pdf") é o nome sugerido para o arquivo baixado. -->

         <br><br>

         <a href="https://example.com/stylesheet.css" rel="stylesheet">Link to stylesheet</a>
        <!-- O atributo rel="stylesheet" atributo especifica a relação entre o documento atual e o documento de destino
        este indica que o link é para uma folha de estilo CSS. -->

        <br><br>

        <p>Go to <a href="https://example.com/about" title="Visit our About section.">our website</a> for more information.</p>
        <!-- O atributo title fornece informações adicionais sobre o link. 
         Quando um usuário passa o mouse sobre o hyperlink, o valor do atributo title é exibido como uma dica de ferramenta. -->

         <br><br>

        <a href="https://www.example.com">
        <img src="/uploads/media/default/0001/03/mountain_landscape.jpg" alt="Mountain landscape" width="340" height="250">
        </a>    
        <!-- Neste exemplo, a imagem é envolvida por um hyperlink. 
         Quando um usuário clica na imagem, ele será direcionado para o URL especificado no atributo href do hyperlink. -->

         <br><br>

        
    </body>
</html>

<!DOCTYPE html>
<html>
    
    <body>
        <p>This is the first line.<br>This is the second line.</p>
        <!-- <br> tag é usada para inserir uma quebra de linha. -->

        <p>This is some text above the line.</p>
        <hr>
        <p>This is some text below the line.</p>
        <!-- <hr> tag é usada para inserir uma linha horizontal, geralmente para separar seções de conteúdo. -->
 
    </body>
</html>

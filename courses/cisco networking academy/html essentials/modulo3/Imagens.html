<!DOCTYPE html>
<html>
<body>
    <img src="https://edube.org/uploads/media/default/0001/03/mountain_landscape.jpg" alt="Mountain landscape" width="340" height="250">
    <!-- src é o link da imagem -->
    <!-- alt é o texto alternativo da imagem -->
    <!-- width e height são os tamanhos da imagem -->

    <br><br>

    <img src="images/picture.jpg" alt="A picture">
    <!-- caminho relativo para a imagem -->

    <br><br>

    <img src="https://example.com/images/picture.jpg" alt="A picture">
    <!-- caminho absoluto para a imagem -->

    <br><br>

    <img src="sunflowers.jpg"
     alt="Sunflowers in the sunset"
     srcset="sunflowers-small.jpg 480w,
             sunflowers-medium.jpg 800w,
             sunflowers-large.jpg 1200w"
     sizes="(max-width: 480px) 95vw,
            (max-width: 800px) 45vw,
            30vw">
    <!-- srcset e sizes são usados para fornecer diferentes versões da imagem 
     para diferentes tamanhos de tela -->

     <br><br>

     <img src="example.jpg" alt="Example image" border="2">
     <!-- border especifica a largura da borda ao redor da imagem.-->

     <br><br>

     <img src="example.jpg" alt="Example image" hspace="10" vspace="10">
    <!-- hspace e vspace especificam o espaço horizontal e vertical ao redor da imagem. -->

    <br><br>

    <img src="example.jpg" alt="Example image" align="left">
    <!-- align especifica o alinhamento da imagem em relação ao texto. -->

</body>
</html>

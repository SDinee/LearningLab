<!--Um dos principais componentes do ARIA é o conceito de papéis. Funções definem o tipo e a finalidade de um elemento, ajudando as tecnologias assistivas a compreender a sua função.-->

<button role="button">Click me</button>
<a href="#" role="link">Read more</a>
<h2 role="heading">Important Information</h2>


<!--Além das funções, a ARIA inclui estados e propriedades que descrevem melhor o comportamento dos elementos. 
Os estados descrevem a condição atual de um elemento, enquanto propriedades fornecer informações adicionais sobre as características de um elemento.-->

<button aria-expanded="true">Toggle menu</button>
<input type="checkbox" aria-checked="false">
<div aria-hidden="true">This content is hidden from screen readers.</div>
